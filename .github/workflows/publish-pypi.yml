# Publish yarbo-data-sdk to PyPI using Trusted Publisher (OIDC).
# Triggered when a version tag (v*.*.*) is pushed to the GitHub repo.
# No API tokens needed — PyPI trusts this GitHub Actions workflow via OIDC.

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          TOML_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Version mismatch — tag=$TAG_VERSION, pyproject.toml=$TOML_VERSION"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Build package
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC Trusted Publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
